<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Development — Yucatán Peninsula Developments</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <div class="brand">
      <span class="brand-mark">YP</span>
      <span class="brand-name">Yucatán Peninsula Developments</span>
    </div>
    <nav class="navlinks">
      <a href="#" class="inert" title="Not wired up in this prototype">Properties for sale</a>
      <a href="#" class="inert" title="Not wired up in this prototype">About</a>
      <a href="#" class="inert" title="Not wired up in this prototype">Blog</a>
      <a href="#" class="inert" title="Not wired up in this prototype">Contact</a>
    </nav>
    <div class="navbar-right">
      <span class="inert nav-icon-label" title="Not wired up in this prototype"><svg class="ui-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.2c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.4 0 .8-.2 1L6.6 10.8z"/></svg> Call us</span>
      <button class="login-btn inert" title="Not wired up in this prototype">Log In</button>
      <span class="lang-pill inert" title="Not wired up in this prototype">EN</span>
      <span class="lang-pill inert" title="Not wired up in this prototype">US$</span>
    </div>
  </header>

  <main class="detail-page">
    <div class="detail-breadcrumb">
      <a href="index.html">Home</a>
      <span>›</span>
      <span id="breadcrumbState"></span>
      <span>›</span>
      <span id="breadcrumbCity"></span>
    </div>

    <div class="detail-title-row">
      <h1 id="devTitle"></h1>
      <div class="detail-title-meta">
        <span class="status-dot"></span>
        <span id="devStatusLine"></span>
      </div>
    </div>

    <div class="detail-gallery">
      <div class="gallery-main" id="galleryMain">
        <div class="gallery-main-content" id="galleryMainContent"></div>
        <button id="favBtn" class="gallery-fav-btn"></button>
        <span class="gallery-counter" id="galleryCounter"></span>
      </div>
      <div class="gallery-thumbs" id="galleryThumbs"></div>
    </div>

    <div class="detail-tabs">
      <button class="detail-tab active" data-tab="details"><svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M4 20V10l8-6 8 6v10a1 1 0 0 1-1 1h-4v-6H9v6H5a1 1 0 0 1-1-1z"/></svg>Property details</button>
      <button class="detail-tab" data-tab="prices"><svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 12.5 12 21l-9-9V4h8l9.5 9z"/><circle cx="7.5" cy="7.5" r="1.5" fill="var(--panel,#fff)"/></svg>Prices and Availability</button>
    </div>

    <div class="detail-body-grid">
      <div class="detail-main-col">
        <section id="tabDetails" class="tab-panel active">
          <div class="price-block">
            <div class="price-block-row">
              <div class="price-main" id="priceMain"></div>
              <div class="currency-toggle">
                <button id="currencyUsdBtn" class="currency-toggle-btn active">USD</button>
                <button id="currencyMxnBtn" class="currency-toggle-btn">MXN</button>
              </div>
            </div>
            <button class="link-btn" id="viewPricesLink">View Prices Details</button>
            <div class="exchange-rate-label" id="exchangeRateLabel"></div>
          </div>

          <div class="detail-fact-list" id="factList"></div>

          <details class="detail-section" open>
            <summary><svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="15" r="4"/><path d="M11 12l9-9M17 6l2 2M14 9l2 2"/></svg>Phases &amp; Delivery</summary>
            <div class="detail-section-body" id="phasesBody"></div>
          </details>

          <details class="detail-section" open>
            <summary><svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s7-7.4 7-12.5A7 7 0 0 0 5 9.5C5 14.6 12 22 12 22z"/><circle cx="12" cy="9.5" r="2.5"/></svg>Points of Interest</summary>
            <div class="detail-section-body poi-body" id="poiBody"></div>
          </details>

          <details class="detail-section" open>
            <summary><svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17c1.2 1 2.4 1 3.6 0s2.4-1 3.6 0 2.4 1 3.6 0 2.4-1 3.6 0 2.4 1 3.6 0"/><path d="M6 13V6a2 2 0 0 1 2-2h2M6 13h12M6 13a2 2 0 0 0-2 2"/></svg>Amenities</summary>
            <div class="detail-section-body" id="amenitiesBody"></div>
          </details>

          <details class="detail-section">
            <summary><svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L4 17l3 3 5.3-5.3a4 4 0 0 0 5.4-5.4l-2.6 2.6-2-2 2.6-2.6z"/></svg>About the Development</summary>
            <div class="detail-section-body" id="developmentBody"></div>
          </details>

          <div class="detail-map" id="detailMap"></div>
        </section>

        <section id="tabPrices" class="tab-panel">
          <div class="prices-header" id="unitsAvailableLine"></div>
          <div class="unit-tabs" id="unitTabs"></div>
          <table class="unit-table" id="unitTable">
            <thead>
              <tr><th>Unit</th><th>Bed</th><th>Bath</th><th>Size</th><th>Price</th><th>Status</th></tr>
            </thead>
            <tbody id="unitTableBody"></tbody>
          </table>
        </section>
      </div>

      <aside class="contact-card">
        <h3 id="contactHeading"></h3>
        <p class="contact-note">Prototype only — this form doesn't send anything anywhere.</p>
        <form id="contactForm">
          <label>Full Name<input type="text" placeholder="Full Name"></label>
          <label>Email<input type="email" placeholder="Email"></label>
          <label>Phone<input type="tel" placeholder="Phone"></label>
          <label>Message<textarea placeholder="Message" rows="3"></textarea></label>
          <button type="submit">Contact an Agent!</button>
        </form>
        <p class="contact-result" id="contactResult"></p>
      </aside>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="data.js"></script>
  <script src="shared.js"></script>
  <script src="detail.js"></script>
</body>
</html>
