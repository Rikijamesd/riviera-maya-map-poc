<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yucatán Peninsula Developments — Prototype</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">YP</span>
      <div class="brand-text">
        <div class="brand-name">Yucatán Peninsula Developments</div>
        <div class="brand-sub">Prototype · sample data, not live listings</div>
      </div>
    </div>

    <div class="filter-bar">
      <div class="filter-pill filter-search">
        <svg viewBox="0 0 20 20" class="pill-icon"><path fill="currentColor" d="M13.6 12.2a6 6 0 1 0-1.4 1.4l3.9 3.9 1.4-1.4-3.9-3.9ZM8 12A4 4 0 1 1 8 4a4 4 0 0 1 0 8Z"/></svg>
        <input id="searchInput" type="search" placeholder="Search developer, project, or city…" autocomplete="off">
      </div>
      <select id="unitFilter" class="filter-pill filter-select">
        <option value="">Bedrooms: Any</option>
        <option value="Studio">Studio</option>
        <option value="1BR">1 Bedroom</option>
        <option value="2BR">2 Bedroom</option>
        <option value="3BR">3 Bedroom</option>
      </select>
      <select id="bathroomFilter" class="filter-pill filter-select">
        <option value="">Bathrooms: Any</option>
        <option value="1">1 Bathroom</option>
        <option value="1.5">1.5 Bathrooms</option>
        <option value="2">2 Bathrooms</option>
        <option value="2.5">2.5 Bathrooms</option>
        <option value="3">3 Bathrooms</option>
      </select>
      <select id="cityFilter" class="filter-pill filter-select">
        <option value="">All cities</option>
      </select>
      <div class="filter-pill price-range">
        <input id="minPrice" type="number" placeholder="Min $" min="0" step="1000" inputmode="numeric">
        <span>–</span>
        <input id="maxPrice" type="number" placeholder="Max $" min="0" step="1000" inputmode="numeric">
      </div>
      <select id="sortBy" class="filter-pill filter-select">
        <option value="">Sort: default</option>
        <option value="price-asc">Price: low to high</option>
        <option value="price-desc">Price: high to low</option>
      </select>
      <label class="filter-pill favorites-toggle">
        <input type="checkbox" id="favoritesOnlyFilter">
        <span class="star">★</span> Favorites
      </label>
    </div>
  </header>

  <main class="layout">
    <div id="map"></div>

    <aside class="sidebar">
      <div class="results-count" id="resultsCount"></div>
      <div class="results-list" id="resultsList"></div>

      <div class="detail-panel" id="detailPanel">
        <p class="detail-placeholder">Click a pin on the map, or a listing below, to see full development details here.</p>
      </div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
