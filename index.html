<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yucatán Peninsula Developments — Prototype</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>Yucatán Peninsula Developments <span class="badge">Prototype — sample data</span></h1>
    <div class="controls">
      <input id="searchInput" type="search" placeholder="Search developer, project, or city…" autocomplete="off">
      <select id="unitFilter">
        <option value="">All unit types</option>
        <option value="Studio">Studio</option>
        <option value="1BR">1 Bedroom</option>
        <option value="2BR">2 Bedroom</option>
        <option value="3BR">3 Bedroom</option>
      </select>
      <select id="cityFilter">
        <option value="">All cities</option>
      </select>
      <select id="bathroomFilter">
        <option value="">All bathrooms</option>
        <option value="1">1 Bathroom</option>
        <option value="1.5">1.5 Bathrooms</option>
        <option value="2">2 Bathrooms</option>
        <option value="2.5">2.5 Bathrooms</option>
        <option value="3">3 Bathrooms</option>
      </select>
      <div class="price-range">
        <input id="minPrice" type="number" placeholder="Min price" min="0" step="1000" inputmode="numeric">
        <span>–</span>
        <input id="maxPrice" type="number" placeholder="Max price" min="0" step="1000" inputmode="numeric">
      </div>
    </div>
  </header>

  <main class="layout">
    <div id="map"></div>

    <aside class="sidebar">
      <div class="results-count" id="resultsCount"></div>
      <div class="results-list" id="resultsList"></div>

      <div class="detail-panel" id="detailPanel">
        <p class="detail-placeholder">Click a marker or a result to see full development details here.</p>
      </div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
